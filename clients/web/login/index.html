<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>

    <form id="loginForm">
      <label>
        Email
        <input id="email" type="email" autocomplete="email" required />
      </label>

      <label>
        Password
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          required
        />
      </label>

      <label>
        <input id="isRegister" type="checkbox" /> Create account
      </label>

      <p id="registerHint" hidden>
        Your username will be generated from your email (you can change it later).
      </p>

      <button id="submitBtn" type="submit">Login</button>
    </form>

    <p id="err" role="alert"></p>

    <script src="/static/login/login.js"></script>
  </body>
</html>
