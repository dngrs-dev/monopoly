<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/partials/general.css">
    <link rel="stylesheet" href="/static/login/styles.css">
</head>
<body>
    <div class="header"></div>

    <div class="widther">
        <div class="login-container">
            <h1>Login to Monopoly</h1>
            <form id="login-form">
                <input type="text" name="email" placeholder="example@test.com" required>
                <input type="password" name="password" placeholder="12345678" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-error" class="error" hidden></p>
        </div>
    </div>

    <div class="footer"></div>

    <script src="/static/login/script.js"></script>
    <script src="/static/partials/header.js"></script>
    <script src="/static/partials/footer.js"></script>
</body>
</html>
