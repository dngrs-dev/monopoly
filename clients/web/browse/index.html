<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse</title>
    <link rel="stylesheet" href="/static/partials/general.css">
    <link rel="stylesheet" href="/static/browse/styles.css">
</head>
<body>
    <div class="header"></div>
    
    <div class="widther">
        <div class="lobbies">
            <h1>Active lobbies</h1>
            <button id="create-lobby">Create lobby</button>
            <div id="lobby-list"></div>
        </div>

        <div id="create-lobby-modal" class="modal" hidden>
            <div class="modal-content">
                <h2>Create lobby</h2>
                <label>
                    Max players
                    <input id="lobby-max-players" type="number" min="2" max="4" value="4">
                </label>

                <div class="modal-actions">
                    <button id="create-lobby-confirm">Create</button>
                    <button id="create-lobby-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer"></div>

    <script src="/static/browse/script.js"></script>
    <script src="/static/partials/header.js"></script>
    <script src="/static/partials/footer.js"></script>
</body>
</html>
