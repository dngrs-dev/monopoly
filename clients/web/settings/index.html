<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="/static/partials/general.css">
    <link rel="stylesheet" href="/static/settings/styles.css">
</head>
<body>
    <div class="header"></div>

    <div class="widther">
        <div class="section">
            <div class="section-general">
                <h1>Profile</h1>
                <label class="avatar-picker">
                    <img id="avatar" class="avatar" alt="Avatar" src="/avatars">
                    <input id="avatar-file-input" type="file" accept="image/png,image/jpeg,image/webp" hidden>
                </label>
                <p id="avatar-status"></p>
                <div class="profile-info">
                    <label class="display-name-row">
                        <span class="display-name">Display name</span>
                        <input type="text" class="display-name-input" autocomplete="off">
                        <p id="display-name-status"></p>
                        <button id="display-name-save" hidden>Save</button>
                    </label>
                    <label class="profile-link-row">
                        <span class="profile-link">Profile link</span>
                        <span class="profile-link-prefix">/profile/</span>
                        <input type="text" class="profile-link-input" autocomplete="off">
                        <p id="profile-link-status"></p>
                        <button id="profile-link-save" hidden>Save</button>
                    </label>
                </div>
            </div>
            <div class="section-security" hidden>
                <h1>Security</h1>
                <div class="security-info">
                    <span class="email">Email</span>
                    <span class="email-value">example@test.com</span>
                    <button class="change-email">Change</button>
                    <span class="password">Password</span>
                    <span class="password-value">********</span>
                    <button class="change-password">Change</button>
                </div>
            </div>
            <div class="section-privacy" hidden></div>
            <div class="section-social" hidden></div>
            <div class="section-notifications" hidden></div>
            <div class="section-other" hidden></div>
        </div>
        <div class="menu">
            <div class="menu-title">Settings</div>
            <a href="#general" class="menu-item">General</a>
            <a href="#security" class="menu-item">Security</a>
            <a href="#privacy" class="menu-item">Privacy</a>
            <a href="#social" class="menu-item">Social</a>
            <a href="#notifications" class="menu-item">Notifications</a>
            <a href="#other" class="menu-item">Other</a>
        </div>
    </div>

    <div class="footer"></div>

    <script src="/static/settings/script.js"></script>
    <script src="/static/partials/header.js"></script>
    <script src="/static/partials/footer.js"></script>
</body>
</html>
