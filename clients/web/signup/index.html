<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Monopoly</title>
    <link rel="stylesheet" href="/static/signup/styles.css">
</head>
<body>
    <div class="login-container">
        <h1>Create account</h1>
        <form id="signup-form">
            <input type="text" name="email" placeholder="example@test.com" required>
            <input type="password" name="password" placeholder="12345678" required>
            <button type="submit">Sign Up</button>
        </form>
        <p id="signup-error" class="error" hidden></p>
    </div>

    <script src="/static/signup/script.js"></script>
</body>
</html>
