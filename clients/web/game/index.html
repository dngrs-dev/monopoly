<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monopoly - Game</title>
  </head>
  <body>
    <h1>Monopoly</h1>

    <div class="row">
      <div>You: <span id="me">(loading)</span></div>
      <div>Player: <span id="player">(unassigned)</span></div>

      <label>Room <input id="room" value="room1" /></label>
      <button id="disconnect" disabled>Disconnect</button>
      <span id="status">disconnected</span>
    </div>

    <p class="error" id="err"></p>

    <h2>Snapshot</h2>
    <pre id="snapshot">(none)</pre>

    <h2>Events</h2>
    <pre id="events">(none)</pre>

    <h2>Players</h2>
    <div id="players"></div>

    <section id="trade-panel" hidden>
      <h2 id="trade-title">Trade</h2>
      <div id="trade-subtitle"></div>
      <p id="trade-error" role="alert"></p>

      <div id="trade-money">
        <div>
          <strong>Offered money</strong>
          <input id="trade-offered-money" type="number" value="0" min="0" />
          <span id="trade-offered-max"></span>
        </div>
        <div>
          <strong>Requested money</strong>
          <input id="trade-requested-money" type="number" value="0" min="0" />
          <span id="trade-requested-max"></span>
        </div>
      </div>

      <div id="trade-properties">
        <div>
          <strong>Your properties</strong>
          <div id="trade-offered-buttons"></div>
        </div>
        <div>
          <strong>Their properties</strong>
          <div id="trade-requested-buttons"></div>
        </div>
      </div>

      <div>
        <strong>Offered list</strong>
        <ul id="trade-offered-list"></ul>
      </div>
      <div>
        <strong>Requested list</strong>
        <ul id="trade-requested-list"></ul>
      </div>

      <div>
        <button id="trade-accept">Accept</button>
        <button id="trade-close">Close</button>
      </div>
    </section>

    <h2>Choices</h2>
    <div class="choices" id="choices"></div>

    <script src="/static/game/game.js"></script>
  </body>
</html>
