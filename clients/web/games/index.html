<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monopoly Live</title>
    <link rel="stylesheet" href="/static/games/styles.css" />
</head>
<body>
    <div class="wrapper">
        <div class="table-body">
            <div class="table-body-players">
                <div class="table-body-players-card">
                    <div class="table-body-players-card-body">
                        <img class="table-body-players-card-body-avatar" src="/avatars" alt="Avatar">
                        <div class="table-body-players-card-body-name">
                            <div class="_status" style="display: none"></div>
                            <div class="_name">Player name</div>
                            <div class="_muted" style="display: none"></div>
                            <div class="_ignore" style="display: none"></div>
                        </div>
                        <div class="table-body-players-card-body-money">00000</div>
                        <div class="table-body-players-card-body-timer">60</div>
                    </div>
                    <div class="table-body-players-card-menu">
                        <div class="_contract"></div>
                        <div class="_profile"></div>
                        <div class="_leave"></div>
                        <div class="_ignore"></div>
                        <div class="_report"></div>
                    </div>
                </div>
            </div>
            <div class="table-body-board">
            </div>
        </div>
    </div>

    <script src="/static/games/script.js"></script>
</body>
</html>
